<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{% block title %}Ayco AI Wealth Advisor{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=DM+Mono:wght@300;400;500&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --gold:      #C9A84C;
      --gold-lt:   #E8CC7E;
      --gold-dim:  #7A6230;
      --ink:       #0A0A0F;
      --surface:   #111118;
      --panel:     #16161F;
      --border:    #2A2A38;
      --muted:     #5A5A70;
      --text:      #D8D8E8;
      --white:     #F0F0F8;
      --green:     #2ECC8A;
      --red:       #E05555;
      --amber:     #E0A030;
      --blue:      #4A90D9;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--ink);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-weight: 300;
      min-height: 100vh;
      font-size: 14px;
      line-height: 1.6;
    }

    /* Noise texture overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
      opacity: 0.4;
    }

    /* ── NAV ── */
    nav {
      position: fixed; top: 0; left: 0; right: 0;
      height: 60px;
      background: rgba(10, 10, 15, 0.92);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; padding: 0 40px;
      gap: 0; z-index: 100;
    }

    .nav-logo {
      font-family: 'Cormorant Garamond', serif;
      font-size: 20px;
      font-weight: 500;
      color: var(--gold);
      letter-spacing: 0.05em;
      margin-right: auto;
      text-decoration: none;
    }

    .nav-logo span { color: var(--muted); font-weight: 300; }

    nav a {
      color: var(--muted);
      text-decoration: none;
      font-size: 12px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 0 16px;
      height: 60px;
      display: flex; align-items: center;
      border-bottom: 2px solid transparent;
      transition: all 0.2s;
    }

    nav a:hover, nav a.active {
      color: var(--gold);
      border-bottom-color: var(--gold);
    }

    /* ── MAIN ── */
    main {
      padding-top: 60px;
      min-height: 100vh;
      position: relative;
      z-index: 1;
    }

    .page-header {
      padding: 60px 40px 40px;
      border-bottom: 1px solid var(--border);
      background: linear-gradient(180deg, rgba(201,168,76,0.04) 0%, transparent 100%);
    }

    .page-header .eyebrow {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 12px;
    }

    .page-header h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 42px;
      font-weight: 300;
      color: var(--white);
      line-height: 1.1;
      margin-bottom: 10px;
    }

    .page-header p {
      color: var(--muted);
      font-size: 14px;
      max-width: 560px;
    }

    .container { max-width: 1100px; margin: 0 auto; padding: 40px; }

    /* ── CARDS ── */
    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 2px;
      padding: 28px;
    }

    .card-title {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 20px;
    }

    /* ── FORM ELEMENTS ── */
    .form-group { margin-bottom: 20px; }

    label {
      display: block;
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
    }

    input[type="text"], input[type="number"], select, textarea {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 2px;
      color: var(--white);
      padding: 10px 14px;
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      outline: none;
      transition: border-color 0.2s;
      appearance: none;
    }

    input:focus, select:focus, textarea:focus {
      border-color: var(--gold-dim);
    }

    select option { background: var(--surface); }

    .btn {
      background: var(--gold);
      color: var(--ink);
      border: none;
      padding: 12px 32px;
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      cursor: pointer;
      border-radius: 2px;
      transition: all 0.2s;
      font-weight: 500;
    }

    .btn:hover { background: var(--gold-lt); }

    .btn-ghost {
      background: transparent;
      color: var(--gold);
      border: 1px solid var(--gold-dim);
    }

    .btn-ghost:hover { background: rgba(201,168,76,0.08); }

    /* ── METRICS ── */
    .metric-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 1px;
      background: var(--border);
      border: 1px solid var(--border);
      border-radius: 2px;
      overflow: hidden;
      margin-bottom: 24px;
    }

    .metric {
      background: var(--panel);
      padding: 20px;
    }

    .metric-label {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .metric-value {
      font-family: 'Cormorant Garamond', serif;
      font-size: 28px;
      font-weight: 500;
      color: var(--white);
      line-height: 1;
    }

    .metric-sub {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--muted);
      margin-top: 4px;
    }

    /* ── VERDICT BADGES ── */
    .badge {
      display: inline-block;
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 4px 12px;
      border-radius: 2px;
    }

    .badge-good     { background: rgba(46,204,138,0.15); color: var(--green); border: 1px solid rgba(46,204,138,0.3); }
    .badge-poor     { background: rgba(224,85,85,0.15);  color: var(--red);   border: 1px solid rgba(224,85,85,0.3); }
    .badge-medium   { background: rgba(224,160,48,0.15); color: var(--amber); border: 1px solid rgba(224,160,48,0.3); }
    .badge-below    { background: rgba(224,160,48,0.15); color: var(--amber); border: 1px solid rgba(224,160,48,0.3); }
    .badge-excellent{ background: rgba(46,204,138,0.15); color: var(--green); border: 1px solid rgba(46,204,138,0.3); }
    .badge-itm      { background: rgba(46,204,138,0.15); color: var(--green); border: 1px solid rgba(46,204,138,0.3); }
    .badge-otm      { background: rgba(224,85,85,0.15);  color: var(--red);   border: 1px solid rgba(224,85,85,0.3); }
    .badge-atm      { background: rgba(74,144,217,0.15); color: var(--blue);  border: 1px solid rgba(74,144,217,0.3); }
    .badge-low      { background: rgba(46,204,138,0.15); color: var(--green); border: 1px solid rgba(46,204,138,0.3); }
    .badge-high     { background: rgba(224,85,85,0.15);  color: var(--red);   border: 1px solid rgba(224,85,85,0.3); }

    /* ── ERROR ── */
    .error-box {
      background: rgba(224,85,85,0.08);
      border: 1px solid rgba(224,85,85,0.3);
      color: var(--red);
      padding: 14px 18px;
      border-radius: 2px;
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      margin-bottom: 24px;
    }

    /* ── TABLE ── */
    table { width: 100%; border-collapse: collapse; }
    th {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      text-align: left;
      padding: 8px 12px;
      border-bottom: 1px solid var(--border);
    }
    td {
      padding: 10px 12px;
      border-bottom: 1px solid rgba(42,42,56,0.5);
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      color: var(--text);
    }
    tr:last-child td { border-bottom: none; }

    /* ── DIVIDER ── */
    .gold-line {
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold-dim), transparent);
      margin: 32px 0;
    }

    /* ── GRID ── */
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
    .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 24px; }

    @media (max-width: 768px) {
      .grid-2, .grid-3 { grid-template-columns: 1fr; }
      .container { padding: 20px; }
      .page-header { padding: 40px 20px 30px; }
      nav { padding: 0 20px; }
      .nav-logo { font-size: 16px; }
    }
  </style>
  {% block extra_style %}{% endblock %}
</head>
<body>
  <nav>
    <a href="/" class="nav-logo">Ayco <span>AI Advisor</span></a>
    <a href="/" {% if request.path == '/' %}class="active"{% endif %}>Overview</a>
    <a href="/research" {% if request.path == '/research' %}class="active"{% endif %}>Research</a>
    <a href="/options" {% if request.path == '/options' %}class="active"{% endif %}>Options</a>
    <a href="/risk" {% if request.path == '/risk' %}class="active"{% endif %}>Risk</a>
    <a href="/about" {% if request.path == '/about' %}class="active"{% endif %}>About</a>
  </nav>
  <main>
    {% block content %}{% endblock %}
  </main>
</body>
</html>
